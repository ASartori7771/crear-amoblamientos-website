{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Crear Amoblamientos</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <!-- FLICKITY -->
    <link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css">

    <!-- CSS DEL PROYECTO -->
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>


<body>

<!-- ================================
     NAVBAR
================================ -->

<header id="site-header">
    <nav id="site-nav">

        <a href="{% url 'inicio' %}" id="nav-logo">
            <img src="{% static 'images/icono-nav3.png' %}" alt="Crear Amoblamientos">
        </a>

        <ul id="nav-links">
            <li><a href="{% url 'inicio' %}">Inicio</a></li>
            <li><a href="{% url 'informacion' %}">Nosotros</a></li>
            <li><a href="{% url 'productos' %}">Productos</a></li>
            <li><a href="{% url 'contacto' %}">Contacto</a></li>
        </ul>

        <!-- Hamburger for mobile -->
        <button id="nav-toggle" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>

    </nav>
</header>


<!-- ================================
     CONTENIDO
================================ -->

<main id="site-main">
    {% block content %}
    {% endblock %}
</main>


<!-- ================================
     FOOTER
================================ -->

<footer id="site-footer">
    <div id="footer-inner">
        <img src="{% static 'images/icono-nav3.png' %}" alt="Logo" id="footer-logo">
        <p>© 2026 Crear Amoblamientos — Diseño y fabricación de amoblamientos a medida</p>
        <div id="footer-links">
            <a href="{% url 'informacion' %}">Nosotros</a>
            <a href="{% url 'productos' %}">Productos</a>
            <a href="{% url 'contacto' %}">Contacto</a>
        </div>
    </div>
</footer>


<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

<!-- FLICKITY -->
<script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>

<!-- Mobile nav toggle -->
<script>
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('nav-links');
    toggle.addEventListener('click', () => {
        links.classList.toggle('open');
        toggle.classList.toggle('active');
    });
</script>

{% comment %} ABRIR IMÁGENES DE PRODUCTOS {% endcomment %}
<script>
    function showImage(src) {
        document.getElementById("modalImage").src = src;
    }
</script>

</body>
</html>
