{% load static %}
<!DOCTYPE html>

<html lang="es">

<head>

    <!-- META -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- TÍTULO Y FAVICON -->
    <title>Crear Amoblamientos</title>
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <!-- FLICKITY -->
    <link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css">

    <!-- CSS DEL PROYECTO -->
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">

</head>


<body id="body-principal">

<!-- =================================================
HEADER / NAVBAR
================================================= -->

<header id="header-principal">

    <nav id="nav-principal" class="navbar">

        <img src="{% static 'images/icono-nav3.png' %}"
             alt="Logo Crear Amoblamientos"
             id="logo-img">

        <ul class="nav justify-content-end" id="menu-nav">

            <li class="nav-item">
                <a class="nav-link active"
                   aria-current="page"
                   href="{% url 'inicio' %}">
                    Inicio
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'informacion' %}">
                    Informacion
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'productos' %}">
                    Productos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'contacto' %}">
                    Contacto
                </a>
            </li>

        </ul>

    </nav>

</header>


<!-- =================================================
CONTENIDO PRINCIPAL
================================================= -->

<div id="contenido-principal">

    <div id="fondo-principal">

        {% block content %}
        {% endblock %}

    </div>

</div>


<!-- =================================================
FOOTER
================================================= -->

<footer id="footer-principal">

    <p id="texto-footer">
        © 2026 Crear Amoblamientos
    </p>

</footer>


<!-- =================================================
SCRIPTS
================================================= -->

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
</script>

<!-- FLICKITY -->
<script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>




{% comment %} ABRIR IMÁGENES DE PRODUCTOS {% endcomment %}

<script>

function showImage(src) {
    document.getElementById("modalImage").src = src;
}

</script>

</body>
</html>
